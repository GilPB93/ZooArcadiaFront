<div class="hero-scene-connection text-center text-white"> 
    <div class="hero-scene-connection-content"> 
        <h1>Espace salarié</h1>
    </div>
</div>

<div class="container"> 
    <div class="messagewarning text-center">
        <p>Cet espace de connexion est dédié uniquement aux éléments salariés du Zoo Arcadia.</p>
    </div>    
    <form>
        <div class="mb-3">
          <label for="EmailInput" class="form-label">Email</label>
          <input type="email" class="form-control" id="EmailInput" placeholder="exemple@email.com" name="Email">
        </div>
        <div class="mb-3">
          <label for="PasswordInput" class="form-label">Mot de passe</label>
          <input type="password" class="form-control" id="PasswordInput" name="Password" placeholder="mot de passe">
        </div>
        <div class="text-center">
            <button type="submit" class="btn btn-secondary">Connexion</button>
        </div>
    </form>
</div>
